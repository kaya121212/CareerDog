<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CareerDog</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      width: 260px;
      background: #fff;
      color: #111;
    }

    /* ── Header ───────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px 10px;
      border-bottom: 1px solid #f0f0f0;
    }
    .header img { width: 22px; height: 22px; border-radius: 4px; }
    .header-title { font-size: 14px; font-weight: 700; flex: 1; }
    #backBtn {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: #6b7280;
      padding: 0 4px 0 0;
      line-height: 1;
    }
    #backBtn:hover { color: #111; }

    /* ── Pages ────────────────────────────────── */
    .page { display: none; padding: 14px; }
    .page.active { display: block; }

    /* ── Home – action buttons ────────────────── */
    .action-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 11px 14px;
      margin-bottom: 8px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      background: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #111;
      transition: background 0.12s, border-color 0.12s;
    }
    .action-btn:last-of-type { margin-bottom: 0; }
    .action-btn:hover:not(:disabled) {
      background: #f5f3ff;
      border-color: #c4b5fd;
    }
    .action-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .action-btn .icon { font-size: 18px; line-height: 1; }
    .action-btn .label { flex: 1; text-align: left; }
    .action-btn .arrow { color: #9ca3af; font-size: 13px; }

    /* disabled hint */
    #autofillHint {
      display: none;
      font-size: 11px;
      color: #9ca3af;
      margin-top: -4px;
      margin-bottom: 8px;
      padding-left: 2px;
    }

    /* ── Profile page ─────────────────────────── */
    label {
      display: block;
      font-size: 11px;
      color: #6b7280;
      margin-top: 10px;
      margin-bottom: 3px;
    }
    input {
      width: 100%;
      padding: 7px 9px;
      border: 1px solid #e5e7eb;
      border-radius: 7px;
      font-size: 13px;
      outline: none;
      color: #111;
    }
    input:focus { border-color: #4f46e5; }
    .name-row { display: flex; gap: 8px; }
    .name-row > div { flex: 1; }

    #saveBtn {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 9px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    #saveBtn:hover { background: #4338ca; }

    /* ── Status ───────────────────────────────── */
    .status {
      margin-top: 10px;
      font-size: 11px;
      text-align: center;
      min-height: 14px;
      color: #16a34a;
    }
    .status.error { color: #dc2626; }
  </style>
</head>
<body>

  <!-- Shared header -->
  <div class="header">
    <button id="backBtn" title="Back">&#8592;</button>
    <img src="icon.png" alt="" />
    <span class="header-title">CareerDog</span>
  </div>

  <!-- ── Page: Home ───────────────────────────── -->
  <div id="page-home" class="page active">

    <button class="action-btn" id="btn-profile">
      <span class="icon">👤</span>
      <span class="label">Profile</span>
      <span class="arrow">›</span>
    </button>

    <button class="action-btn" id="btn-autofill">
      <span class="icon">✏️</span>
      <span class="label">Autofill</span>
    </button>
    <div id="autofillHint">Not available on LinkedIn</div>

    <button class="action-btn" id="btn-copy">
      <span class="icon">📋</span>
      <span class="label">Copy job info</span>
    </button>

    <div id="homeStatus" class="status"></div>

  </div>

  <!-- ── Page: Profile ────────────────────────── -->
  <div id="page-profile" class="page">

    <div class="name-row">
      <div>
        <label for="firstName">First name</label>
        <input id="firstName" type="text" placeholder="Jane" />
      </div>
      <div>
        <label for="lastName">Last name</label>
        <input id="lastName" type="text" placeholder="Doe" />
      </div>
    </div>

    <label for="email">Email</label>
    <input id="email" type="email" placeholder="jane@example.com" />

    <label for="phone">Phone</label>
    <input id="phone" type="tel" placeholder="+1 555 000 0000" />

    <label for="linkedin">LinkedIn URL</label>
    <input id="linkedin" type="url" placeholder="https://linkedin.com/in/janedoe" />

    <div class="name-row">
      <div>
        <label for="location">Location</label>
        <input id="location" type="text" placeholder="New York, NY" />
      </div>
      <div>
        <label for="zipCode">Zip code</label>
        <input id="zipCode" type="text" placeholder="10001" />
      </div>
    </div>

    <button id="saveBtn">Save</button>
    <div id="profileStatus" class="status"></div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
